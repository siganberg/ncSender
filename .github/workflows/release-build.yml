name: Build Release Binaries

on:
  push:
    tags:
      - 'v*'
      - '!v*-beta*'

jobs:
  prepare-release:
    name: Prepare Draft Release
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.info.outputs.tag }}
      version: ${{ steps.info.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Extract tag info
        id: info
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Get release notes from tag message
        run: |
          TAG="${{ github.ref_name }}"
          git fetch origin tag "$TAG" --force
          TAG_MESSAGE=$(git tag -l --format='%(contents)' "$TAG" 2>/dev/null || true)
          if [ -n "$TAG_MESSAGE" ]; then
            echo "$TAG_MESSAGE" > release-notes.md
          else
            echo "Release $TAG" > release-notes.md
          fi

      - name: Create draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release create "$TAG" \
            --repo ${{ github.repository }} \
            --title "Release $TAG" \
            --notes-file release-notes.md \
            --draft

  macos:
    name: macOS Builds
    needs: [prepare-release]
    runs-on: macos-14  # macOS Sonoma (stable)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set version from tag
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          cd app && npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Install Dependencies
        run: |
          npm ci
          cd client && npm ci
        working-directory: app

      - name: Build Client
        run: npm run build:client
        working-directory: app

      - name: Build Electron (arm64)
        run: |
          rm -rf dist-electron
          npm run dist -- --mac --arm64 --publish never
        working-directory: app

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: app/dist-electron/**

  linux:
    name: Linux Builds
    needs: [prepare-release]
    runs-on: ubuntu-22.04  # Ubuntu 22.04 LTS (stable)
    strategy:
      fail-fast: false
      matrix:
        arch: [x64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libudev-dev \
            libusb-1.0-0-dev

      - name: Set version from tag
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          cd app && npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Install Dependencies
        run: |
          npm ci
          cd client && npm ci
        working-directory: app

      - name: Build Client
        run: npm run build:client
        working-directory: app

      - name: Build Electron (${{ matrix.arch }})
        run: |
          rm -rf dist-electron
          npm run dist -- --linux --${{ matrix.arch }} --publish never
        working-directory: app

      - name: Upload Linux Artifact (${{ matrix.arch }})
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}-artifacts
          path: app/dist-electron/**

  windows:
    name: Windows Builds
    needs: [prepare-release]
    runs-on: windows-2022  # Windows Server 2022 (stable)
    strategy:
      fail-fast: false
      matrix:
        arch: [x64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set version from tag
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          cd app && npm version "$VERSION" --no-git-tag-version --allow-same-version
        shell: bash

      - name: Install Dependencies
        run: |
          npm ci
          cd client && npm ci
        working-directory: app

      - name: Build Client
        run: npm run build:client
        working-directory: app

      - name: Build Electron (${{ matrix.arch }})
        shell: pwsh
        run: |
          if (Test-Path dist-electron) { Remove-Item dist-electron -Recurse -Force }
          npm run dist -- --win --${{ matrix.arch }} --publish never
        working-directory: app

      - name: Upload Windows Artifact (${{ matrix.arch }})
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}-artifacts
          path: app/dist-electron/**

  linux-arm64:
    name: Linux ARM64 Build
    needs: [prepare-release]
    runs-on: ubuntu-22.04  # Ubuntu 22.04 LTS (stable)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set version from tag
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          cd app && npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libfuse2 \
            rpm \
            fakeroot \
            ruby \
            ruby-dev \
            rubygems \
            build-essential \
            libudev-dev \
            libusb-1.0-0-dev
          sudo gem install --no-document fpm

      - name: Install Dependencies
        run: |
          npm ci
          cd client && npm ci
        working-directory: app

      - name: Build Client
        run: npm run build:client
        working-directory: app

      - name: Build Electron (Linux ARM64)
        run: |
          rm -rf dist-electron
          npm run dist -- --linux --arm64 --publish never
        working-directory: app
        env:
          USE_SYSTEM_FPM: "true"

      - name: List built artifacts
        run: |
          echo "Built Linux ARM64 artifacts:"
          ls -lh app/dist-electron/

      - name: Upload Linux ARM64 Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64-artifacts
          path: app/dist-electron/**

  publish-release:
    name: Publish Release
    needs: [prepare-release, macos, linux, windows, linux-arm64]
    runs-on: ubuntu-22.04  # Ubuntu 22.04 LTS (stable)
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets (preserve electron-builder filenames)
        run: |
          mkdir -p release-assets
          TAG="${{ needs.prepare-release.outputs.tag }}"
          VERSION="${{ needs.prepare-release.outputs.version }}"

          echo "Downloaded artifacts structure:"
          find artifacts -type f

          # macOS assets (only DMG files, skip ZIP due to signing issues)
          if [ -d "artifacts/macos-artifacts" ]; then
            for file in artifacts/macos-artifacts/*arm64*.dmg; do
              if [ -f "$file" ]; then
                cp "$file" "release-assets/ncSender_${TAG}_macos_arm64.dmg"
              fi
            done
            for file in artifacts/macos-artifacts/latest-mac.yml; do
              if [ -f "$file" ]; then
                cp "$file" "release-assets/latest-mac.yml"
              fi
            done
          fi

          # Windows assets
          if [ -d "artifacts/windows-x64-artifacts" ]; then
            for file in artifacts/windows-x64-artifacts/*.exe; do
              if [ -f "$file" ]; then
                cp "$file" "release-assets/ncSender_${TAG}_windows_x64.exe"
              fi
            done
            for file in artifacts/windows-x64-artifacts/*.msi; do
              if [ -f "$file" ]; then
                cp "$file" "release-assets/ncSender_${TAG}_windows_x64.msi"
              fi
            done
            for file in artifacts/windows-x64-artifacts/*.zip; do
              if [ -f "$file" ]; then
                cp "$file" "release-assets/ncSender_${TAG}_windows_x64.zip"
              fi
            done
            for file in artifacts/windows-x64-artifacts/latest.yml; do
              if [ -f "$file" ]; then
                cp "$file" "release-assets/latest.yml"
              fi
            done
          fi

          # Linux x64 assets (.deb only)
          if [ -d "artifacts/linux-x64-artifacts" ]; then
            for file in artifacts/linux-x64-artifacts/*.deb; do
              if [ -f "$file" ]; then
                cp "$file" "release-assets/ncSender_${TAG}_linux_x64.deb"
              fi
            done
          fi

          # Linux ARM64 assets (.deb only)
          if [ -d "artifacts/linux-arm64-artifacts" ]; then
            for file in artifacts/linux-arm64-artifacts/*.deb; do
              if [ -f "$file" ]; then
                cp "$file" "release-assets/ncSender_${TAG}_linux_arm64.deb"
              fi
            done
          fi

          # Copy architecture-specific YAML files
          if [ -f "artifacts/linux-x64-artifacts/latest-linux.yml" ]; then
            cp "artifacts/linux-x64-artifacts/latest-linux.yml" "release-assets/latest-linux.yml"
          elif [ -f "artifacts/linux-x64-artifacts/latest-linux-x64.yml" ]; then
            cp "artifacts/linux-x64-artifacts/latest-linux-x64.yml" "release-assets/latest-linux.yml"
          fi

          if [ -f "artifacts/linux-arm64-artifacts/latest-linux-arm64.yml" ]; then
            cp "artifacts/linux-arm64-artifacts/latest-linux-arm64.yml" "release-assets/latest-linux-arm64.yml"
          elif [ -f "artifacts/linux-arm64-artifacts/latest-linux.yml" ]; then
            cp "artifacts/linux-arm64-artifacts/latest-linux.yml" "release-assets/latest-linux-arm64.yml"
          fi

          # Rewrite Linux updater manifests to match renamed asset filenames
          if [ -f "release-assets/latest-linux.yml" ]; then
            VERSION="${VERSION}" TAG="${TAG}" python3 -c "from pathlib import Path; import os; path = Path('release-assets/latest-linux.yml'); text = path.read_text(); version = os.environ['VERSION']; tag = os.environ['TAG']; text = text.replace(f'ncsender_{version}_amd64.deb', f'ncSender_{tag}_linux_x64.deb'); path.write_text(text)"
          fi

          if [ -f "release-assets/latest-linux-arm64.yml" ]; then
            VERSION="${VERSION}" TAG="${TAG}" python3 -c "from pathlib import Path; import os; path = Path('release-assets/latest-linux-arm64.yml'); text = path.read_text(); version = os.environ['VERSION']; tag = os.environ['TAG']; text = text.replace(f'ncsender_{version}_arm64.deb', f'ncSender_{tag}_linux_arm64.deb'); path.write_text(text)"
          fi

          echo "Release assets to upload:"
          ls -lh release-assets/

      - name: Upload assets to draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.prepare-release.outputs.tag }}"
          gh release upload "$TAG" \
            --repo ${{ github.repository }} \
            --clobber \
            release-assets/*

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.prepare-release.outputs.tag }}"
          gh release edit "$TAG" \
            --repo ${{ github.repository }} \
            --draft=false \
            --latest

      - name: Announce on Discord
        if: success() && env.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/${{ needs.prepare-release.outputs.tag }}"

          curl -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"🚀 ncSender ${{ needs.prepare-release.outputs.tag }} Released!\",
                \"description\": \"A new version of ncSender is now available.\",
                \"url\": \"${RELEASE_URL}\",
                \"color\": 1941124,
                \"fields\": [
                  {
                    \"name\": \"Download\",
                    \"value\": \"[View Release](${RELEASE_URL})\"
                  }
                ]
              }]
            }" \
            "$DISCORD_WEBHOOK_URL"

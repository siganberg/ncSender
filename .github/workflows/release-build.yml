name: Build Release

on:
  push:
    tags:
      - 'v*'
      - '!v*-beta*'

permissions:
  contents: write

jobs:
  prepare-release:
    name: Prepare Draft Release
    runs-on: ubuntu-22.04
    outputs:
      tag: ${{ steps.info.outputs.tag }}
      version: ${{ steps.info.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Extract tag info
        id: info
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Get release notes from tag message
        run: |
          TAG="${{ github.ref_name }}"
          git fetch origin tag "$TAG" --force 2>/dev/null || true
          TAG_MESSAGE=$(git tag -l --format='%(contents)' "$TAG" 2>/dev/null || true)
          if [ -n "$TAG_MESSAGE" ]; then
            echo "$TAG_MESSAGE" > release-notes.md
          else
            echo "Release $TAG" > release-notes.md
          fi

      - name: Create draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          gh release delete "$TAG" --repo ${{ github.repository }} --yes 2>/dev/null || true
          gh release create "$TAG" \
            --repo ${{ github.repository }} \
            --title "Release $TAG" \
            --notes-file release-notes.md \
            --draft

  test:
    name: Run Tests
    needs: prepare-release
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --logger "trx;LogFileName=test-results.trx"

  linux-x64:
    name: Linux x64
    needs: [prepare-release, test]
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build client
        run: |
          cd src/NcSender.Client
          npm ci
          npm run build

      - name: Build server via Docker
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          DOCKER_BUILDKIT=1 docker build \
            --build-arg RID=linux-x64 \
            --build-arg VERSION=$VERSION \
            -f .scripts/DockerfileServerDebian \
            --output type=local,dest=publish-server \
            .

      - name: Stage resources for Electron
        run: |
          mkdir -p src/NcSender.Desktop/resources/server
          mkdir -p src/NcSender.Desktop/resources/client/dist
          cp -r publish-server/* src/NcSender.Desktop/resources/server/
          cp -r src/NcSender.Client/dist/* src/NcSender.Desktop/resources/client/dist/

      - name: Install Electron dependencies
        run: |
          cd src/NcSender.Desktop
          npm ci

      - name: Package Electron app
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          cd src/NcSender.Desktop
          npx electron-builder --linux deb --x64 --publish never \
            -c.extraMetadata.version="$VERSION"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64-artifacts
          path: src/NcSender.Desktop/dist-electron/**

  linux-arm64:
    name: Linux ARM64
    needs: [prepare-release, test]
    runs-on: [self-hosted, macos]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build client
        run: |
          cd src/NcSender.Client
          npm ci
          npm run build

      - name: Build server via Docker
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          DOCKER_BUILDKIT=1 docker build \
            --platform linux/arm64 \
            --build-arg RID=linux-arm64 \
            --build-arg VERSION=$VERSION \
            -f .scripts/DockerfileServerDebian \
            --output type=local,dest=publish-server \
            .

      - name: Stage resources for Electron
        run: |
          mkdir -p src/NcSender.Desktop/resources/server
          mkdir -p src/NcSender.Desktop/resources/client/dist
          cp -r publish-server/* src/NcSender.Desktop/resources/server/
          cp -r src/NcSender.Client/dist/* src/NcSender.Desktop/resources/client/dist/

      - name: Install Electron dependencies
        run: |
          cd src/NcSender.Desktop
          npm ci

      - name: Package Electron app
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          cd src/NcSender.Desktop
          npx electron-builder --linux deb --arm64 --publish never \
            -c.extraMetadata.version="$VERSION"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64-artifacts
          path: src/NcSender.Desktop/dist-electron/**

  macos:
    name: macOS
    needs: [prepare-release, test]
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build client
        run: |
          cd src/NcSender.Client
          npm ci
          npm run build

      - name: Publish server
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          SYSROOT="$(xcrun --show-sdk-path)"
          dotnet publish src/NcSender.Server -c Release -r osx-arm64 --self-contained \
            /p:PublishAot=true "/p:SysRoot=${SYSROOT}" /p:Version="$VERSION" -o publish-server/

      - name: Stage resources for Electron
        run: |
          mkdir -p src/NcSender.Desktop/resources/server
          mkdir -p src/NcSender.Desktop/resources/client/dist
          cp -r publish-server/* src/NcSender.Desktop/resources/server/
          rm -f src/NcSender.Desktop/resources/server/*.pdb
          cp -r src/NcSender.Client/dist/* src/NcSender.Desktop/resources/client/dist/

      - name: Install Electron dependencies
        run: |
          cd src/NcSender.Desktop
          npm ci

      - name: Package Electron app
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          cd src/NcSender.Desktop
          npx electron-builder --mac dmg --arm64 --publish never \
            -c.extraMetadata.version="$VERSION"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: src/NcSender.Desktop/dist-electron/**

  macos-x64:
    name: macOS x64
    needs: [prepare-release, test]
    runs-on: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build client
        run: |
          cd src/NcSender.Client
          npm ci
          npm run build

      - name: Publish server
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          SYSROOT="$(xcrun --show-sdk-path)"
          dotnet publish src/NcSender.Server -c Release -r osx-x64 --self-contained \
            /p:PublishAot=true "/p:SysRoot=${SYSROOT}" /p:Version="$VERSION" -o publish-server/

      - name: Stage resources for Electron
        run: |
          mkdir -p src/NcSender.Desktop/resources/server
          mkdir -p src/NcSender.Desktop/resources/client/dist
          cp -r publish-server/* src/NcSender.Desktop/resources/server/
          rm -f src/NcSender.Desktop/resources/server/*.pdb
          cp -r src/NcSender.Client/dist/* src/NcSender.Desktop/resources/client/dist/

      - name: Install Electron dependencies
        run: |
          cd src/NcSender.Desktop
          npm ci

      - name: Package Electron app
        run: |
          VERSION="${{ needs.prepare-release.outputs.version }}"
          cd src/NcSender.Desktop
          npx electron-builder --mac dmg --x64 --publish never \
            -c.extraMetadata.version="$VERSION"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-x64-artifacts
          path: src/NcSender.Desktop/dist-electron/**

  windows-x64:
    name: Windows x64
    needs: [prepare-release, test]
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build client
        run: |
          cd src/NcSender.Client
          npm ci
          npm run build

      - name: Publish Server
        run: |
          $VERSION = "${{ needs.prepare-release.outputs.version }}"
          dotnet publish src/NcSender.Server -c Release -r win-x64 --self-contained /p:PublishAot=true "/p:Version=$VERSION" -o publish-server/

      - name: Stage resources for Electron
        shell: powershell
        run: |
          New-Item -ItemType Directory -Path "src/NcSender.Desktop/resources/server", "src/NcSender.Desktop/resources/client/dist" -Force
          Copy-Item -Recurse publish-server/* src/NcSender.Desktop/resources/server/
          Remove-Item src/NcSender.Desktop/resources/server/*.pdb -ErrorAction SilentlyContinue
          Copy-Item -Recurse src/NcSender.Client/dist/* src/NcSender.Desktop/resources/client/dist/

      - name: Install Electron dependencies
        run: |
          cd src/NcSender.Desktop
          npm ci

      - name: Package Electron app
        shell: powershell
        run: |
          $VERSION = "${{ needs.prepare-release.outputs.version }}"
          cd src/NcSender.Desktop
          npx electron-builder --win nsis --x64 --publish never "-c.extraMetadata.version=$VERSION"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x64-artifacts
          path: src/NcSender.Desktop/dist-electron/**

  publish-release:
    name: Publish Release
    needs:
      - prepare-release
      - linux-x64
      - linux-arm64
      - macos
      - macos-x64
      - windows-x64
    runs-on: ubuntu-22.04
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          TAG="${{ needs.prepare-release.outputs.tag }}"

          echo "Downloaded artifacts structure:"
          find artifacts -type f

          # macOS assets (DMG only)
          if [ -d "artifacts/macos-artifacts" ]; then
            for file in artifacts/macos-artifacts/*arm64*.dmg; do
              if [ -f "$file" ]; then
                cp "$file" "release-assets/ncSender_${TAG}_macos_arm64.dmg"
              fi
            done
          fi

          # macOS x64 assets (DMG only)
          if [ -d "artifacts/macos-x64-artifacts" ]; then
            for file in artifacts/macos-x64-artifacts/*x64*.dmg artifacts/macos-x64-artifacts/*.dmg; do
              if [ -f "$file" ]; then
                cp "$file" "release-assets/ncSender_${TAG}_macos_x64.dmg"
                break
              fi
            done
          fi

          # Windows assets
          if [ -d "artifacts/windows-x64-artifacts" ]; then
            for file in artifacts/windows-x64-artifacts/*.exe; do
              if [ -f "$file" ]; then
                cp "$file" "release-assets/ncSender_${TAG}_windows_x64.exe"
              fi
            done
          fi

          # Linux x64 assets (.deb only)
          if [ -d "artifacts/linux-x64-artifacts" ]; then
            for file in artifacts/linux-x64-artifacts/*.deb; do
              if [ -f "$file" ]; then
                cp "$file" "release-assets/ncSender_${TAG}_linux_x64.deb"
              fi
            done
          fi

          # Linux ARM64 assets (.deb only)
          if [ -d "artifacts/linux-arm64-artifacts" ]; then
            for file in artifacts/linux-arm64-artifacts/*.deb; do
              if [ -f "$file" ]; then
                cp "$file" "release-assets/ncSender_${TAG}_linux_arm64.deb"
              fi
            done
          fi

          echo "Release assets to upload:"
          ls -lh release-assets/

      - name: Upload assets to draft release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.prepare-release.outputs.tag }}"
          gh release upload "$TAG" \
            --repo ${{ github.repository }} \
            --clobber \
            release-assets/*

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.prepare-release.outputs.tag }}"
          gh release edit "$TAG" \
            --repo ${{ github.repository }} \
            --draft=false \
            --latest

      - name: Announce on Discord
        if: success() && env.DISCORD_WEBHOOK_URL != ''
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          TAG="${{ needs.prepare-release.outputs.tag }}"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/${TAG}"

          curl -H "Content-Type: application/json" \
            -d "{
              \"embeds\": [{
                \"title\": \"ncSender ${TAG} Released!\",
                \"description\": \"A new version of ncSender is now available.\",
                \"url\": \"${RELEASE_URL}\",
                \"color\": 1941124,
                \"fields\": [
                  {
                    \"name\": \"Download\",
                    \"value\": \"[View Release](${RELEASE_URL})\"
                  }
                ]
              }]
            }" \
            "$DISCORD_WEBHOOK_URL"
